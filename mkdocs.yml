site_name: ABM-ENSO-Colombia
site_description: Modelo Basado en Agentes del sistema climático-hidrológico colombiano bajo forzamiento ENSO
site_author: Sebastián Coba Daza
repo_url: https://github.com/sebastiancobad/abm-enso-colombia
repo_name: abm-enso-colombia
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate

nav:
  - Inicio: index.md
  - Guía:
    - Instalación: instalacion.md
    - Quickstart: quickstart.md
    - Roadmap: roadmap.md
  - Teoría:
    - Fundamentos del ABM: teoria/fundamentos.md
    - ENSO y el oscilador de Lorenz: teoria/enso-lorenz.md
    - Protocolo ODD: teoria/odd.md
  - Módulos:
    - Datos: modulos/data.md
    - Análisis: modulos/analysis.md
    - Modelo: modulos/model.md
    - Visualización: modulos/viz.md
  - Referencias: referencias.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: es

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sebastiancobad/abm-enso-colombia
